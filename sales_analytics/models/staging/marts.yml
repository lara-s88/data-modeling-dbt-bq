version: 2

models:
  - name: fact_sales
    description: "Final sales fact table with revenue and profit calculations"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to dim_customer"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_id
      - name: product_id
        description: "Foreign key to dim_product"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: order_date
        description: "Date the order was placed"
        data_tests:
          - not_null
      - name: quantity
        description: "Number of units ordered"
        data_tests:
          - not_null
      - name: amount
        description: "Total amount paid"
        data_tests:
          - not_null
      - name: payment_method
        description: "Payment method used"
        data_tests:
          - not_null
      - name: revenue
        description: "Revenue generated from the order"
        data_tests:
          - not_null
      - name: profit
        description: "Profit calculated as amount minus product cost price"
        data_tests:
          - not_null

  - name: dim_customer
    description: "Customer dimension table with demographic information"
    columns:
      - name: customer_id
        description: "Unique identifier for each customer"
        data_tests:
          - unique
          - not_null
      - name: customer_name
        description: "Full name of the customer"
        data_tests:
          - not_null
      - name: email
        description: "Customer email address"
        data_tests:
          - unique
          - not_null
      - name: region
        description: "Geographic region of the customer"
        data_tests:
          - not_null
      - name: signup_date
        description: "Date the customer signed up"
        data_tests:
          - not_null

  - name: dim_product
    description: "Product dimension table with category and pricing information"
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        data_tests:
          - unique
          - not_null
      - name: product_name
        description: "Name of the product"
        data_tests:
          - not_null
      - name: category
        description: "Product category"
        data_tests:
          - not_null
      - name: cost_price
        description: "Cost price of the product"
        data_tests:
          - not_null